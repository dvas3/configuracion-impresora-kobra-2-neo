#################################################
# Anycubic Kobra 2 Neo - Klipper base
# Estructura separada:
#   - mainsail.cfg: macros base del cliente
#   - macros.cfg  : macros personalizadas y rutinas
#################################################

[include mainsail.cfg]
[include macros.cfg]

[exclude_object]
[gcode_arcs]

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 10000
max_z_velocity: 8
max_z_accel: 800
square_corner_velocity: 5.0

[input_shaper]
shaper_freq_x: 54.8
shaper_type_x: ei
shaper_freq_y: 34.0
shaper_type_y: mzv

[stepper_x]
step_pin: PA12
dir_pin: PA11
enable_pin: !PA15
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PB11
position_endstop: -10
position_min: -14
position_max: 235
homing_speed: 100

[stepper_y]
step_pin: PA9
dir_pin: !PA8
enable_pin: !PA15
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PC13
position_endstop: -2
position_min: -3
position_max: 240
homing_speed: 100

[stepper_z]
step_pin: PB0
dir_pin: !PB1
enable_pin: !PA15
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -4
position_max: 250
homing_speed: 15
second_homing_speed: 1

[extruder]
max_extrude_cross_section: 5.0
step_pin: PB15
dir_pin: PB14
enable_pin: !PA15
microsteps: 16
max_extrude_only_distance: 200
max_extrude_only_velocity: 80
max_extrude_only_accel: 5000
rotation_distance: 7.084
nozzle_diameter: 0.400
filament_diameter: 1.750
pressure_advance: 0.0400
heater_pin: PB8
sensor_type: ATC Semitec 104GT-2
sensor_pin: PC3
min_extrude_temp: 170
min_temp: 0
max_temp: 280

[heater_bed]
heater_pin: PB9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC1
min_temp: 0
max_temp: 120

[probe]
pin: PA1
x_offset: 24.0
y_offset: 13.35
samples: 4
samples_result: median
sample_retract_dist: 2.5
speed: 10
lift_speed: 12
samples_tolerance: 0.05
samples_tolerance_retries: 4

[bed_mesh]
speed: 180
horizontal_move_z: 8
mesh_min: 14, 11
mesh_max: 210, 215
probe_count: 7, 7
mesh_pps: 2, 2
fade_start: 0.6
fade_end: 10.0
algorithm: bicubic
bicubic_tension: 0.15

[safe_z_home]
home_xy_position: 110, 110
speed: 100
z_hop: 8
z_hop_speed: 15

[controller_fan controller_fan]
pin: PB12

[heater_fan extruder_fan]
pin: PB13

[fan]
pin: PB5
cycle_time: 0.00005

[output_pin enable_pin]
pin: PB6
value: 1

[gcode_button pb4]
pin: PB4
press_gcode: CANCEL_PRINT

[gcode_button pa0]
pin: PA0
press_gcode:
  QUERY_BUTTON button=pa0
release_gcode:
  QUERY_BUTTON button=pa0

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[idle_timeout]
timeout: 1800
gcode:
  _SET_STATUS_READY
  TURN_OFF_HEATERS
  M106 S0
  {% if printer.pause_resume.is_paused %}
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=idle_state VALUE=True
  {% endif %}

[save_variables]
filename: ~/printer_data/config/variables.cfg

