[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos: True
variable_custom_park_x: 220.0
variable_custom_park_y: 220.0
variable_custom_park_dz: 10.0
variable_retract: 1.2
variable_cancel_retract: 5.0
variable_speed_retract: 35.0
variable_unretract: 1.0
variable_speed_unretract: 25.0
variable_speed_hop: 15.0
variable_speed_move: 200.0
variable_park_at_cancel: True
variable_park_at_cancel_x: 220.0
variable_park_at_cancel_y: 220.0
variable_use_fw_retract: False
variable_idle_timeout: 1800
variable_runout_sensor: ""
variable_user_pause_macro: "_SET_STATUS_PAUSED"
variable_user_resume_macro: "_SET_STATUS_PRINTING"
variable_user_cancel_macro: "_SET_STATUS_CANCELLED"
gcode:

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set allow_park = client.park_at_cancel|default(false)|lower == 'true' %}
  {% set retract = client.cancel_retract|default(5.0)|abs %}
  {% set park_x = "" if (client.park_at_cancel_x|default(none) is none) else "X=" ~ client.park_at_cancel_x %}
  {% set park_y = "" if (client.park_at_cancel_y|default(none) is none) else "Y=" ~ client.park_at_cancel_y %}
  {% set custom_park = park_x|length > 0 or park_y|length > 0 %}
  {% if printer['gcode_macro RESUME'].restore_idle_timeout > 0 %}
    SET_IDLE_TIMEOUT TIMEOUT={printer['gcode_macro RESUME'].restore_idle_timeout}
  {% endif %}
  {% if (custom_park or not printer.pause_resume.is_paused) and allow_park %}
    _TOOLHEAD_PARK_PAUSE_CANCEL {park_x} {park_y}
  {% endif %}
  _CLIENT_RETRACT LENGTH={retract}
  TURN_OFF_HEATERS
  M106 S0
  {client.user_cancel_macro|default("")}
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=idle_state VALUE=False
  SET_PAUSE_NEXT_LAYER ENABLE=0
  SET_PAUSE_AT_LAYER ENABLE=0 LAYER=0
  CANCEL_PRINT_BASE

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set idle_timeout = client.idle_timeout|default(0) %}
  {% set temp = printer[printer.toolhead.extruder].target if printer.toolhead.extruder != '' else 0 %}
  {% set restore = False if printer.toolhead.extruder == '' else True if params.RESTORE|default(1)|int == 1 else False %}
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=last_extruder_temp VALUE="{{'restore': restore, 'temp': temp}}"
  {% if idle_timeout > 0 %}
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_idle_timeout VALUE={printer.configfile.settings.idle_timeout.timeout}
    SET_IDLE_TIMEOUT TIMEOUT={idle_timeout}
  {% endif %}
  PAUSE_BASE
  {client.user_pause_macro|default("")}
  _TOOLHEAD_PARK_PAUSE_CANCEL {rawparams}

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
variable_last_extruder_temp: {'restore': False, 'temp': 0}
variable_restore_idle_timeout: 0
variable_idle_state: False
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set velocity = printer.configfile.settings.pause_resume.recover_velocity %}
  {% set sp_move = client.speed_move|default(velocity) %}
  {% set runout_resume = True if client.runout_sensor|default("") == "" else True if not printer[client.runout_sensor].enabled else printer[client.runout_sensor].filament_detected %}
  {% set can_extrude = True if printer.toolhead.extruder == '' else printer[printer.toolhead.extruder].can_extrude %}
  {% set do_resume = False %}
  {% set prompt_txt = [] %}
  {% if printer.idle_timeout.state|upper == "IDLE" or idle_state %}
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=idle_state VALUE=False
    {% if last_extruder_temp.restore %}
      RESPOND TYPE=echo MSG='{"Restoring \"%s\" temperature to %3.1f\u00B0C, this may take some time" % (printer.toolhead.extruder, last_extruder_temp.temp) }'
      M109 S{last_extruder_temp.temp}
      {% set do_resume = True %}
    {% elif can_extrude %}
      {% set do_resume = True %}
    {% else %}
      RESPOND TYPE=error MSG='{"Resume aborted !!! \"%s\" not hot enough, please heat up again and press RESUME" % printer.toolhead.extruder}'
      {% set _d = prompt_txt.append("\"%s\" not hot enough, please heat up again and press RESUME" % printer.toolhead.extruder) %}
    {% endif %}
  {% elif can_extrude %}
    {% set do_resume = True %}
  {% else %}
    RESPOND TYPE=error MSG='{"Resume aborted !!! \"%s\" not hot enough, please heat up again and press RESUME" % printer.toolhead.extruder}'
    {% set _d = prompt_txt.append("\"%s\" not hot enough, please heat up again and press RESUME" % printer.toolhead.extruder) %}
  {% endif %}
  {% if runout_resume %}
    {% if do_resume %}
      {% if restore_idle_timeout > 0 %}
        SET_IDLE_TIMEOUT TIMEOUT={restore_idle_timeout}
      {% endif %}
      {client.user_resume_macro|default("")}
      _CLIENT_EXTRUDE
      RESUME_BASE VELOCITY={params.VELOCITY|default(sp_move)}
    {% endif %}
  {% else %}
    RESPOND TYPE=error MSG='{"Resume aborted !!! \"%s\" detects no filament, please load filament and press RESUME" % (client.runout_sensor.split(" "))[1]}'
    {% set _d = prompt_txt.append("\"%s\" detects no filament, please load filament and press RESUME" % (client.runout_sensor.split(" "))[1]) %}
  {% endif %}
  {% if not (runout_resume and do_resume) %}
    RESPOND TYPE=command MSG="action:prompt_begin RESUME aborted !!!"
    {% for element in prompt_txt %}
      RESPOND TYPE=command MSG='{"action:prompt_text %s" % element}'
    {% endfor %}
    RESPOND TYPE=command MSG="action:prompt_footer_button Ok|RESPOND TYPE=command MSG=action:prompt_end|info"
    RESPOND TYPE=command MSG="action:prompt_show"
  {% endif %}

[gcode_macro SET_PAUSE_NEXT_LAYER]
description: Enable a pause if the next layer is reached
gcode:
  {% set pause_next_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_next_layer %}
  {% set ENABLE = params.ENABLE|default(1)|int != 0 %}
  {% set MACRO = params.MACRO|default(pause_next_layer.call, True) %}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_next_layer VALUE="{{ 'enable': ENABLE, 'call': MACRO }}"

[gcode_macro SET_PAUSE_AT_LAYER]
description: Enable or disable a pause if a given layer is reached
gcode:
  {% set pause_at_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_at_layer %}
  {% set ENABLE = params.ENABLE|int != 0 if params.ENABLE is defined else params.LAYER is defined %}
  {% set LAYER = params.LAYER|default(pause_at_layer.layer)|int %}
  {% set MACRO = params.MACRO|default(pause_at_layer.call, True) %}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_at_layer VALUE="{{ 'enable': ENABLE, 'layer': LAYER, 'call': MACRO }}"

[gcode_macro SET_PRINT_STATS_INFO]
rename_existing: SET_PRINT_STATS_INFO_BASE
description: Overwrite, to get pause_next_layer and pause_at_layer feature
variable_pause_next_layer: { 'enable': False, 'call': "PAUSE" }
variable_pause_at_layer: { 'enable': False, 'layer': 0, 'call': "PAUSE" }
gcode:
  {% if pause_next_layer.enable %}
    RESPOND TYPE=echo MSG='{"%s, forced by pause_next_layer" % pause_next_layer.call}'
    {pause_next_layer.call}
    SET_PAUSE_NEXT_LAYER ENABLE=0
  {% elif pause_at_layer.enable and params.CURRENT_LAYER is defined and params.CURRENT_LAYER|int == pause_at_layer.layer %}
    RESPOND TYPE=echo MSG='{"%s, forced by pause_at_layer [%d]" % (pause_at_layer.call, pause_at_layer.layer)}'
    {pause_at_layer.call}
    SET_PAUSE_AT_LAYER ENABLE=0
  {% endif %}
  SET_PRINT_STATS_INFO_BASE {rawparams}

[gcode_macro _TOOLHEAD_PARK_PAUSE_CANCEL]
description: Helper: park toolhead used in PAUSE and CANCEL_PRINT
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set velocity = printer.configfile.settings.pause_resume.recover_velocity %}
  {% set use_custom = client.use_custom_pos|default(false)|lower == 'true' %}
  {% set custom_park_x = client.custom_park_x|default(0.0) %}
  {% set custom_park_y = client.custom_park_y|default(0.0) %}
  {% set park_dz = client.custom_park_dz|default(2.0)|abs %}
  {% set sp_hop = client.speed_hop|default(15) * 60 %}
  {% set sp_move = client.speed_move|default(velocity) * 60 %}
  {% set origin = printer.gcode_move.homing_origin %}
  {% set act = printer.gcode_move.gcode_position %}
  {% set max = printer.toolhead.axis_maximum %}
  {% set cone = printer.toolhead.cone_start_z|default(max.z) %}
  {% set round_bed = True if printer.configfile.settings.printer.kinematics is in ['delta', 'polar', 'rotary_delta', 'winch'] else False %}
  {% set z_min = params.Z_MIN|default(0)|float %}
  {% set z_park = [[(act.z + park_dz), z_min]|max, (max.z - origin.z)]|min %}
  {% set x_requested = params.X|float if params.X is defined else custom_park_x if use_custom else 0.0 if round_bed else (max.x - 5.0) %}
  {% set y_requested = params.Y|float if params.Y is defined else custom_park_y if use_custom else (max.y - 5.0) if round_bed and z_park < cone else 0.0 if round_bed else (max.y - 5.0) %}
  {% set x_park = [[x_requested, printer.toolhead.axis_minimum.x + 1.0]|max, max.x - 1.0]|min %}
  {% set y_park = [[y_requested, printer.toolhead.axis_minimum.y + 1.0]|max, max.y - 1.0]|min %}
  _CLIENT_RETRACT
  {% if "xyz" in printer.toolhead.homed_axes %}
    G90
    G1 Z{z_park} F{sp_hop}
    G1 X{x_park} Y{y_park} F{sp_move}
    {% if not printer.gcode_move.absolute_coordinates %}
      G91
    {% endif %}
  {% else %}
    RESPOND TYPE=echo MSG='Printer not homed'
  {% endif %}

[gcode_macro _CLIENT_EXTRUDE]
description: Extrudes if the extruder is hot enough
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set use_fw_retract = (client.use_fw_retract|default(false)|lower == 'true') and (printer.firmware_retraction is defined) %}
  {% set length = params.LENGTH|default(client.unretract)|default(1.0)|float %}
  {% set speed = params.SPEED|default(client.speed_unretract)|default(35) %}
  {% set absolute_extrude = printer.gcode_move.absolute_extrude %}
  {% if printer.toolhead.extruder != '' %}
    {% if printer[printer.toolhead.extruder].can_extrude %}
      {% if use_fw_retract %}
        {% if length < 0 %}
          G10
        {% else %}
          G11
        {% endif %}
      {% else %}
        M83
        G1 E{length} F{(speed|float|abs) * 60}
        {% if absolute_extrude %}
          M82
        {% endif %}
      {% endif %}
    {% else %}
      RESPOND TYPE=echo MSG='{"\"%s\" not hot enough" % printer.toolhead.extruder}'
    {% endif %}
  {% endif %}

[gcode_macro _CLIENT_RETRACT]
description: Retracts if the extruder is hot enough
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set length = params.LENGTH|default(client.retract)|default(1.0)|float %}
  {% set speed = params.SPEED|default(client.speed_retract)|default(35) %}
  _CLIENT_EXTRUDE LENGTH=-{length|float|abs} SPEED={speed|float|abs}

[gcode_macro _CLIENT_LINEAR_MOVE]
description: Linear move with save and restore of the gcode state
gcode:
  {% set x_move = "X" ~ params.X if params.X is defined else "" %}
  {% set y_move = "Y" ~ params.Y if params.Y is defined else "" %}
  {% set z_move = "Z" ~ params.Z if params.Z is defined else "" %}
  {% set e_move = "E" ~ params.E if params.E is defined else "" %}
  {% set rate = "F" ~ params.F if params.F is defined else "" %}
  {% set ABSOLUTE = params.ABSOLUTE|default(0)|int != 0 %}
  {% set ABSOLUTE_E = params.ABSOLUTE_E|default(0)|int != 0 %}
  SAVE_GCODE_STATE NAME=_client_movement
  {% if x_move or y_move or z_move %}
    G9{0 if ABSOLUTE else 1}
  {% endif %}
  {% if e_move %}
    M8{2 if ABSOLUTE_E else 3}
  {% endif %}
  G1 {x_move} {y_move} {z_move} {e_move} {rate}
  RESTORE_GCODE_STATE NAME=_client_movement

[gcode_macro _SET_STATUS_PRINTING]
gcode:
  M117 Imprimiendo

[gcode_macro _SET_STATUS_PAUSED]
gcode:
  M117 Impresion en pausa

[gcode_macro _SET_STATUS_CANCELLED]
gcode:
  M117 Impresion cancelada

[gcode_macro _SET_STATUS_READY]
gcode:
  M117 Lista

[gcode_macro _SET_STATUS_HEATING]
gcode:
  M117 Calentando

[gcode_macro _SET_STATUS_MESH]
gcode:
  M117 Midiendo cama

[gcode_macro _CENTER_AND_HOME]
gcode:
  G90
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% endif %}
  G1 X110 Y110 F12000

[gcode_macro START_PRINT]
description: Arranque adaptativo con homing Z, malla local precisa y purga junto a la pieza
gcode:
  {% set bed = params.BED|default(60)|float %}
  {% set hotend = params.EXTRUDER|default(205)|float %}
  {% set mesh_hotend_min = params.MESH_HOTEND_MIN|default(170)|float %}
  {% set mesh_bed_min = params.MESH_BED_MIN|default(50)|float %}
  {% set soak = params.SOAK|default(5)|int %}
  {% set purge_len = params.PURGE|default(15)|float %}
  {% set minx = params.MINX|default(14)|float %}
  {% set miny = params.MINY|default(11)|float %}
  {% set maxx = params.MAXX|default(210)|float %}
  {% set maxy = params.MAXY|default(215)|float %}
  {% set start_x = params.START_X|default(minx)|float %}
  {% set start_y = params.START_Y|default(miny)|float %}
  {% set home_x = 110.0 %}
  {% set home_y = 110.0 %}

  _SET_STATUS_HEATING
  CLEAR_PAUSE
  BED_MESH_CLEAR
  G90
  M83
  M140 S{bed}
  M104 S{hotend}
  M106 S0
  G28
  TEMPERATURE_WAIT SENSOR=extruder MINIMUM={mesh_hotend_min}
  TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={mesh_bed_min}
  {% if soak > 0 %}
    G4 P{soak * 1000}
  {% endif %}
  _SET_STATUS_MESH
  ADAPTIVE_BED_MESH MINX={minx} MINY={miny} MAXX={maxx} MAXY={maxy}
  G1 X{home_x} Y{home_y} Z10 F12000
  G92 E0
  M190 S{bed}
  M109 S{hotend}
  ADAPTIVE_PURGE MINX={minx} MINY={miny} MAXX={maxx} MAXY={maxy} LENGTH={purge_len}
  G1 X{start_x} Y{start_y} Z2.0 F18000
  _SET_STATUS_PRINTING

[gcode_macro PRINT_START]
description: Alias compatible con perfiles de slicer que llaman PRINT_START
gcode:
  START_PRINT {rawparams}

[gcode_macro ADAPTIVE_BED_MESH]
description: Genera una malla precisa solo sobre el area de la pieza
gcode:
  {% set bed_min_x = 14.0 %}
  {% set bed_min_y = 11.0 %}
  {% set bed_max_x = 210.0 %}
  {% set bed_max_y = 215.0 %}
  {% set margin = params.MARGIN|default(8)|float %}
  {% set minx = [params.MINX|default(bed_min_x)|float - margin, bed_min_x]|max %}
  {% set miny = [params.MINY|default(bed_min_y)|float - margin, bed_min_y]|max %}
  {% set maxx = [params.MAXX|default(bed_max_x)|float + margin, bed_max_x]|min %}
  {% set maxy = [params.MAXY|default(bed_max_y)|float + margin, bed_max_y]|min %}
  {% set span_x = maxx - minx %}
  {% set span_y = maxy - miny %}
  {% set probe_x = 7 if span_x >= 140 else 6 if span_x >= 90 else 5 %}
  {% set probe_y = 7 if span_y >= 140 else 6 if span_y >= 90 else 5 %}
  RESPOND TYPE=echo MSG='{"Adaptive mesh area X %.1f..%.1f Y %.1f..%.1f using %dx%d points" % (minx, maxx, miny, maxy, probe_x, probe_y)}'
  BED_MESH_CLEAR
  BED_MESH_CALIBRATE MESH_MIN={minx},{miny} MESH_MAX={maxx},{maxy} PROBE_COUNT={probe_x},{probe_y}

[gcode_macro END_PRINT]
description: Final de impresion con retraccion, limpieza y aparcado
gcode:
  {% set z_lift = params.Z|default(10)|float %}
  SAVE_GCODE_STATE NAME=STATE_END_PRINT
  M400
  G92 E0
  G1 E-1.5 F2400
  G91
  G1 Z{z_lift} E-2 F1800
  G90
  G1 X220 Y220 F12000
  TURN_OFF_HEATERS
  M106 S0
  BED_MESH_CLEAR
  _SET_STATUS_READY
  RESTORE_GCODE_STATE NAME=STATE_END_PRINT MOVE=0

[gcode_macro PRINT_END]
description: Alias compatible con perfiles de slicer que llaman PRINT_END
gcode:
  END_PRINT {rawparams}

[gcode_macro ORCA_LAYER_CHANGE]
description: Actualiza capa actual y total para OrcaSlicer y Mainsail
gcode:
  {% set current_layer = params.LAYER|default(0)|int %}
  {% set total_layer = params.TOTAL|default(0)|int %}
  SET_PRINT_STATS_INFO CURRENT_LAYER={current_layer} TOTAL_LAYER={total_layer}

[gcode_macro ORCA_BEFORE_LAYER_CHANGE]
description: Alias por si quieres enganchar un macro antes de cada cambio de capa
gcode:
  ORCA_LAYER_CHANGE {rawparams}

[gcode_macro QUICK_PAUSE]
description: Pausa corta con aparcado frontal
gcode:
  PAUSE X=15 Y=215 Z_MIN=25

[gcode_macro PAUSE_FRONT]
description: Pausa con aparcado frontal izquierdo para cambios de filamento
gcode:
  PAUSE X=10 Y=215 Z_MIN=50

[gcode_macro M600]
description: Cambio de filamento
gcode:
  PAUSE X=10 Y=215 Z_MIN=50

[gcode_macro RESUME_PRINT]
description: Alias practico de RESUME
gcode:
  RESUME

[gcode_macro CANCEL_AND_COOLDOWN]
description: Cancela la impresion y deja la maquina fria
gcode:
  CANCEL_PRINT
  TURN_OFF_HEATERS
  M106 S0
  _SET_STATUS_CANCELLED

[gcode_macro LINE_PURGE]
description: Dibuja una linea de purga segura
gcode:
  {% set length = params.LENGTH|default(22)|float %}
  {% set x_start = 4.0 %}
  {% set y_start = 6.0 %}
  {% set z_height = 0.28 %}
  G90
  M83
  G92 E0
  G1 Z{z_height} F1200
  G1 X{x_start} Y{y_start} F12000
  G1 X{x_start} Y{y_start + length} E10 F900
  G1 X{x_start + 0.8} Y{y_start + length} F12000
  G1 X{x_start + 0.8} Y{y_start} E10 F900
  G92 E0

[gcode_macro ADAPTIVE_PURGE]
description: Purga horizontal junto a la pieza con salida diagonal rapida hacia el borde
gcode:
  {% set axis_min_x = printer.toolhead.axis_minimum.x + 1.0 %}
  {% set axis_min_y = printer.toolhead.axis_minimum.y + 1.0 %}
  {% set axis_max_x = printer.toolhead.axis_maximum.x - 1.0 %}
  {% set axis_max_y = printer.toolhead.axis_maximum.y - 1.0 %}
  {% set bed_safe_x = [4.0, axis_min_x]|max %}
  {% set bed_safe_y = [4.0, axis_min_y]|max %}
  {% set minx = params.MINX|default(20)|float %}
  {% set miny = params.MINY|default(20)|float %}
  {% set maxx = params.MAXX|default(60)|float %}
  {% set maxy = params.MAXY|default(60)|float %}
  {% set length = [params.LENGTH|default(15)|float, 15.0]|max %}
  {% set diag_len = params.DIAG|default(5.0)|float %}
  {% set offset_x = params.OFFSET_X|default(4.0)|float %}
  {% set offset_y = params.OFFSET_Y|default(3.0)|float %}
  {% set z_height = params.Z|default(0.30)|float %}
  {% set prime_e = params.E|default(12.5)|float %}
  {% set diag_e = params.DIAG_E|default(2.2)|float %}
  {% set target_x = minx - offset_x %}
  {% set target_y = miny - offset_y %}
  {% set use_left_edge = target_x - length < bed_safe_x or target_y < bed_safe_y %}
  {% set x_start_raw = target_x if not use_left_edge else bed_safe_x + length + 2.0 %}
  {% set y_line_raw = target_y if not use_left_edge else [miny, bed_safe_y + 14.0]|max %}
  {% set x_start = [[x_start_raw, bed_safe_x + length + 1.0]|max, axis_max_x]|min %}
  {% set y_line = [[y_line_raw, bed_safe_y + 1.0]|max, axis_max_y - 1.0]|min %}
  {% set x_end = [[x_start - length, bed_safe_x]|max, axis_max_x]|min %}
  {% set x_diag = [[x_end - (diag_len * 0.7071), bed_safe_x]|max, axis_max_x]|min %}
  {% set y_diag = [[y_line - (diag_len * 0.7071), bed_safe_y]|max, axis_max_y]|min %}
  {% set x_exit = [[x_diag + 2.0, bed_safe_x]|max, axis_max_x]|min %}
  {% set y_exit = [[y_diag + 2.0, bed_safe_y]|max, axis_max_y]|min %}
  RESPOND TYPE=echo MSG='{"Adaptive purge x1=%.2f y1=%.2f x2=%.2f y2=%.2f x3=%.2f y3=%.2f fallback=%s" % (x_start, y_line, x_end, y_line, x_diag, y_diag, use_left_edge)}'
  G90
  M83
  G92 E0
  G1 Z5 F2400
  G1 X{x_start} Y{y_line} F18000
  G1 Z{z_height} F900
  G1 X{x_end} Y{y_line} E{prime_e} F900
  G1 X{x_diag} Y{y_diag} E{diag_e} F750
  G92 E0
  G1 Z1.5 F3000
  G1 X{x_exit} Y{y_exit} F18000

[gcode_macro LOAD_FILAMENT]
description: Carga filament hasta boquilla
gcode:
  {% set temp = params.TEMP|default(220)|float %}
  {% set length = params.LENGTH|default(80)|float %}
  _CENTER_AND_HOME
  M109 S{temp}
  M83
  G92 E0
  G1 E{length} F300
  G1 E20 F120
  G92 E0

[gcode_macro UNLOAD_FILAMENT]
description: Descarga filament
gcode:
  {% set temp = params.TEMP|default(220)|float %}
  {% set length = params.LENGTH|default(90)|float %}
  _CENTER_AND_HOME
  M109 S{temp}
  M83
  G92 E0
  G1 E8 F300
  G1 E-25 F1800
  G1 E-{length} F2400
  G92 E0

[gcode_macro NOZZLE_CLEAN]
description: Limpieza basica antes de calibrar o imprimir
gcode:
  {% set temp = params.TEMP|default(190)|float %}
  _CENTER_AND_HOME
  M109 S{temp}
